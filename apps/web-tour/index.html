<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Memphis: White Walls</title>
  </head>
  <body>
    <canvas id="renderCanvas" aria-label="Ancient Memphis 3D tour viewport"></canvas>

    <main class="hud" aria-label="Tour controls">
      <section class="status-panel" aria-live="polite">
        <div class="brand-block">
          <span>Ancient Memphis</span>
          <strong>White Walls</strong>
        </div>
        <div class="stop-block">
          <span id="periodLabel">Early Dynastic / Old Kingdom</span>
          <h1 id="stopTitle">Loading</h1>
          <p id="stopSummary"></p>
          <span id="evidencePill" class="evidence-pill">Inferred</span>
        </div>
      </section>

      <nav class="toolbar" aria-label="Tour actions">
        <button id="playTour" type="button">
          <i data-lucide="play" aria-hidden="true"></i>
          <span>Play route</span>
        </button>
        <button id="resetTour" type="button" aria-label="Reset route">
          <i data-lucide="rotate-ccw" aria-hidden="true"></i>
        </button>
        <button id="toggleEvidence" type="button" aria-pressed="false">
          <i data-lucide="layers-3" aria-hidden="true"></i>
          <span>Evidence</span>
        </button>
        <button id="toggleNarrator" type="button" aria-pressed="false">
          <i data-lucide="volume-2" aria-hidden="true"></i>
          <span>Soundscape</span>
        </button>
        <button id="enterVr" type="button">
          <i data-lucide="glasses" aria-hidden="true"></i>
          <span>VR</span>
        </button>
      </nav>

      <section id="evidenceLegend" class="legend" hidden>
        <span><b class="dot confirmed"></b>Confirmed</span>
        <span><b class="dot inferred"></b>Inferred</span>
        <span><b class="dot speculative"></b>Speculative</span>
      </section>

      <section id="evidenceDetail" class="evidence-detail" aria-live="polite" hidden>
        <div class="evidence-detail__header">
          <span id="evidenceDetailLevel">Inferred</span>
          <strong id="evidenceDetailTitle">Evidence</strong>
        </div>
        <p id="evidenceDetailDescription"></p>

        <div class="evidence-detail__group">
          <span>Supported by</span>
          <ul id="evidenceClaims"></ul>
        </div>

        <div class="evidence-detail__group">
          <span>Reconstruction</span>
          <ul id="reconstructionNotes"></ul>
        </div>

        <div class="evidence-detail__group">
          <span>Sources</span>
          <ul id="evidenceSources"></ul>
        </div>
      </section>
    </main>

    <div id="soundscapeAudio" class="soundscape-audio" aria-hidden="true">
      <audio data-soundscape-file="nile-water-boats.wav" preload="auto" loop src="/assets/generated/audio/nile-water-boats.wav"></audio>
      <audio data-soundscape-file="birds-wind-insects.wav" preload="auto" loop src="/assets/generated/audio/birds-wind-insects.wav"></audio>
      <audio data-soundscape-file="market-craft-murmur.wav" preload="auto" loop src="/assets/generated/audio/market-craft-murmur.wav"></audio>
      <audio data-soundscape-file="temple-incense-chant.wav" preload="auto" loop src="/assets/generated/audio/temple-incense-chant.wav"></audio>
      <audio data-soundscape-file="dust-footsteps.wav" preload="auto" loop src="/assets/generated/audio/dust-footsteps.wav"></audio>
    </div>

    <aside id="errorPanel" class="error-panel" role="alert" hidden></aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
